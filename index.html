<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Golden Age Playlists - Gerenciador</title>
<style>
    :root {
        --bg-main: #0a0a0c;
        --bg-panel: #131316;
        --primary-purple: #9d4edd;
        --secondary-purple: #7b2cbf;
        --hover-purple: #c77dff;
        --text-main: #f8f9fa;
        --text-muted: #adb5bd;
        --border-color: #2a2a35;
        --glow-purple: 0 0 20px rgba(157, 78, 221, 0.25);
    }

    body {
        font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: var(--bg-main);
        background-image: radial-gradient(circle at top center, rgba(123, 44, 191, 0.1) 0%, transparent 50%);
        color: var(--text-main);
        margin: 0;
        padding: 40px 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
    }

    h1 {
        color: var(--text-main);
        text-transform: uppercase;
        letter-spacing: 4px;
        margin-bottom: 40px;
        font-weight: 900;
        text-align: center;
    }

    h1 span {
        background: linear-gradient(90deg, var(--primary-purple), var(--hover-purple));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-shadow: var(--glow-purple);
    }

    .container {
        display: flex;
        gap: 30px;
        width: 100%;
        max-width: 1200px;
        align-items: flex-start;
    }

    .panel {
        background-color: var(--bg-panel);
        padding: 30px;
        border-radius: 16px;
        border: 1px solid var(--border-color);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        flex: 1;
        position: relative;
        overflow: hidden;
    }

    .panel::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 4px;
        background: linear-gradient(90deg, var(--secondary-purple), var(--hover-purple));
    }

    .panel h2 {
        margin-top: 0;
        font-size: 18px;
        color: var(--text-main);
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 25px;
    }

    .panel h2::before {
        content: "";
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background-color: var(--primary-purple);
        box-shadow: 0 0 10px var(--hover-purple);
    }

    .form-group {
        margin-bottom: 20px;
    }

    label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--text-muted);
        margin-bottom: 8px;
    }

    input[type="text"], textarea {
        width: 100%;
        background-color: rgba(0, 0, 0, 0.2);
        border: 1px solid var(--border-color);
        color: var(--text-main);
        padding: 14px;
        border-radius: 8px;
        box-sizing: border-box;
        font-family: inherit;
        font-size: 14px;
        transition: all 0.3s ease;
    }

    input[type="text"]:focus, textarea:focus {
        outline: none;
        border-color: var(--primary-purple);
        box-shadow: 0 0 0 3px rgba(157, 78, 221, 0.15);
        background-color: rgba(0, 0, 0, 0.4);
    }

    textarea {
        resize: vertical;
        min-height: 90px;
    }

    button {
        background: linear-gradient(135deg, var(--secondary-purple), var(--primary-purple));
        color: white;
        border: none;
        padding: 14px 20px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 1px;
        transition: all 0.3s ease;
        width: 100%;
        margin-top: 10px;
        box-shadow: 0 4px 15px rgba(123, 44, 191, 0.3);
    }

    button:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(157, 78, 221, 0.5);
        background: linear-gradient(135deg, var(--primary-purple), var(--hover-purple));
    }

    .btn-secondary {
        background: transparent;
        border: 1px solid var(--border-color);
        box-shadow: none;
    }

    .btn-secondary:hover {
        background: rgba(255, 255, 255, 0.05);
        box-shadow: none;
        border-color: var(--text-muted);
    }

    .output-group {
        margin-top: 30px;
        padding-top: 25px;
        border-top: 1px solid var(--border-color);
    }

    #preview-box {
        background-color: #000;
        padding: 30px;
        border-radius: 12px;
        min-height: 300px;
        display: flex;
        justify-content: center;
        align-items: center;
        border: 1px solid var(--border-color);
        background-image: repeating-linear-gradient(45deg, #111 25%, transparent 25%, transparent 75%, #111 75%, #111), repeating-linear-gradient(45deg, #111 25%, #0a0a0c 25%, #0a0a0c 75%, #111 75%, #111);
        background-position: 0 0, 10px 10px;
        background-size: 20px 20px;
    }

    /* Notificação de Copiado */
    .toast {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background-color: var(--primary-purple);
        color: white;
        padding: 12px 24px;
        border-radius: 8px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        transform: translateY(100px);
        opacity: 0;
        transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        z-index: 1000;
        font-weight: bold;
    }

    .toast.show {
        transform: translateY(0);
        opacity: 1;
    }

    @media (max-width: 900px) {
        .container {
            flex-direction: column;
        }
    }
</style>
</head>
<body>

<h1><span>Golden Age</span> Playlists</h1>

<div class="container">
    <div class="panel">
        <h2>Editor de Playlist</h2>
        
        <div class="form-group">
            <label>URL da Imagem de Capa</label>
            <input type="text" id="input-cover" placeholder="https://i.imgur.com/K1b7A6u.png" oninput="generate()">
        </div>

        <div class="form-group">
            <label>Subtítulo</label>
            <input type="text" id="input-type" placeholder="Ex: Feiticeiro Jujutsu" oninput="generate()">
        </div>

        <div class="form-group">
            <label>Título (Nome do Personagem)</label>
            <input type="text" id="input-title" placeholder="Nome do Personagem" oninput="generate()">
        </div>

        <div class="form-group">
            <label>Descrição</label>
            <input type="text" id="input-desc" placeholder="Temas de batalha, estética..." oninput="generate()">
        </div>

        <div class="form-group">
            <label>Código Iframe do Spotify</label>
            <textarea id="input-iframe" placeholder="Cole o <iframe...> do Spotify aqui" oninput="generate()"></textarea>
        </div>

        <div class="output-group">
            <label>Código Gerado (Linha Única)</label>
            <textarea id="output-code" readonly onclick="this.select()"></textarea>
            <button onclick="copyCode()">Copiar Código</button>
        </div>
    </div>

    <div class="panel">
        <h2>Importar / Preview</h2>
        
        <div class="form-group">
            <label>Colar código existente para edição</label>
            <textarea id="import-code" placeholder="Cole o código HTML gerado anteriormente aqui"></textarea>
            <button class="btn-secondary" onclick="importData()">Importar e Editar</button>
        </div>

        <h2 style="margin-top: 40px;">Preview</h2>
        <div id="preview-box"></div>
    </div>
</div>

<div id="toast" class="toast">Código copiado com sucesso!</div>

<script>
    // Carrega os dados do LocalStorage ao abrir a página
    window.onload = function() {
        loadData();
        generate();
    };

    function getTemplate(cover, type, title, desc, iframe) {
        // CSS do template atualizado para um gradiente roxo escuro no fundo, modernizando o visual da postagem
        let css = `<style>.spot-container{max-width:550px !important;margin:15px auto !important;background:linear-gradient(180deg,#241038 0%,#0a0a0c 45%) !important;border-radius:12px !important;font-family:'Segoe UI',Helvetica,Arial,sans-serif !important;color:#fff !important;padding:24px !important;box-sizing:border-box !important;box-shadow:0 10px 30px rgba(0,0,0,0.6) !important;line-height:normal !important; border: 1px solid #2a1640 !important;}.spot-container *{box-sizing:border-box !important}.spot-header{display:flex !important;gap:20px !important;align-items:flex-end !important;margin-bottom:24px !important}.spot-cover{width:150px !important;height:150px !important;min-width:150px !important;object-fit:cover !important;box-shadow:0 8px 25px rgba(0,0,0,.5) !important;border-radius:8px !important;border:none !important;padding:0 !important;margin:0 !important}.spot-info{display:flex !important;flex-direction:column !important;justify-content:flex-end !important;width:100% !important;overflow:hidden !important}.spot-type{font-size:12px !important;font-weight:700 !important;text-transform:uppercase !important;margin-bottom:6px !important;letter-spacing:1.5px !important;color:#c77dff !important}.spot-title{font-size:38px !important;font-weight:900 !important;margin:0 !important;line-height:1.1 !important;letter-spacing:-1px !important;color:#fff !important;text-transform:none !important;font-family:Georgia,serif !important;text-shadow: 0 2px 10px rgba(0,0,0,0.5) !important;}.spot-desc{font-size:14px !important;color:#b3b3b3 !important;margin:12px 0 0 0 !important;line-height:1.5 !important}.spot-iframe-wrapper{width:100% !important;margin-top:10px !important;overflow:hidden !important; border-radius: 12px !important; box-shadow: 0 4px 15px rgba(0,0,0,0.3) !important;}.spot-iframe-wrapper iframe{width:100% !important;max-width:100% !important;border:none !important;display:block !important;margin:0 !important;padding:0 !important}</style>`;
        
        let html = `<div class="spot-container"><div class="spot-header"><img src="${cover}" class="spot-cover"><div class="spot-info"><span class="spot-type">${type}</span><div class="spot-title">${title}</div><p class="spot-desc">${desc}</p></div></div><div class="spot-iframe-wrapper">${iframe}</div></div>`;
        
        return css + html;
    }

    function generate() {
        let cover = document.getElementById('input-cover').value || 'https://i.imgur.com/K1b7A6u.png';
        let type = document.getElementById('input-type').value || 'SAYLIST';
        let title = document.getElementById('input-title').value || 'Sayonara';
        let desc = document.getElementById('input-desc').value || 'Tá olhando oq?????';
        let iframe = document.getElementById('input-iframe').value || '<iframe style="border-radius:12px" src="https://open.spotify.com/embed/playlist/37i9dQZF1DXcBWIGoYBM5M" width="100%" height="352" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>';

        let finalCode = getTemplate(cover, type, title, desc, iframe);
        
        // Remove quebras de linha para garantir a formatação inline exigida
        finalCode = finalCode.replace(/(\r\n|\n|\r)/gm, "");
        
        document.getElementById('output-code').value = finalCode;
        document.getElementById('preview-box').innerHTML = finalCode;

        saveData(); // Salva automaticamente a cada alteração
    }

    function importData() {
        let importedString = document.getElementById('import-code').value;
        if (!importedString) return;

        let tempDiv = document.createElement('div');
        tempDiv.innerHTML = importedString;

        try {
            let coverImg = tempDiv.querySelector('.spot-cover');
            let typeSpan = tempDiv.querySelector('.spot-type');
            let titleDiv = tempDiv.querySelector('.spot-title');
            let descP = tempDiv.querySelector('.spot-desc');
            let iframeWrapper = tempDiv.querySelector('.spot-iframe-wrapper');

            if (coverImg) document.getElementById('input-cover').value = coverImg.src;
            if (typeSpan) document.getElementById('input-type').value = typeSpan.innerText;
            if (titleDiv) document.getElementById('input-title').value = titleDiv.innerText;
            if (descP) document.getElementById('input-desc').value = descP.innerText;
            if (iframeWrapper) {
                let iframeTag = iframeWrapper.querySelector('iframe');
                if (iframeTag) document.getElementById('input-iframe').value = iframeTag.outerHTML;
            }

            generate();
            document.getElementById('import-code').value = '';
            showToast("Código importado com sucesso!");
        } catch (e) {
            alert('Erro ao importar o código. Verifique se ele está completo.');
        }
    }

    function copyCode() {
        let copyText = document.getElementById("output-code");
        copyText.select();
        copyText.setSelectionRange(0, 99999);
        navigator.clipboard.writeText(copyText.value);
        showToast("Código copiado com sucesso!");
    }

    function showToast(message) {
        let toast = document.getElementById("toast");
        toast.innerText = message;
        toast.className = "toast show";
        setTimeout(function(){ toast.className = toast.className.replace("show", ""); }, 3000);
    }

    // --- FUNÇÕES DE LOCALSTORAGE ---
    function saveData() {
        const playlistData = {
            cover: document.getElementById('input-cover').value,
            type: document.getElementById('input-type').value,
            title: document.getElementById('input-title').value,
            desc: document.getElementById('input-desc').value,
            iframe: document.getElementById('input-iframe').value
        };
        localStorage.setItem('goldenAgePlaylist', JSON.stringify(playlistData));
    }

    function loadData() {
        const savedData = localStorage.getItem('goldenAgePlaylist');
        if (savedData) {
            try {
                const playlistData = JSON.parse(savedData);
                document.getElementById('input-cover').value = playlistData.cover || '';
                document.getElementById('input-type').value = playlistData.type || '';
                document.getElementById('input-title').value = playlistData.title || '';
                document.getElementById('input-desc').value = playlistData.desc || '';
                document.getElementById('input-iframe').value = playlistData.iframe || '';
            } catch (e) {
                console.error("Erro ao carregar dados salvos:", e);
            }
        }
    }
</script>

</body>
</html>
